- route:
    id: document-analysis-workflow
    from:
      uri: file
      parameters:
        directoryName: "{{documents.directory}}"
        idempotent: true
        include: .*\.(pdf|docx|pptx|html|md)
        noop: true
      steps:
        - log:
            message: "Processing document: ${header.CamelFileName}"
        - setProperty:
            name: originalFileName
            expression:
              simple:
                expression: "${header.CamelFileName}"
        - setBody:
            expression:
              simple:
                expression: "${body.file.absolutePath}"
        - log:
            message: Converting document to Markdown with Docling...
        - to:
            uri: docling
            parameters:
              operationId: CONVERT_TO_MARKDOWN
              contentInBody: true
              doclingServeUrl: "{{docling.serve.url}}"
              useDoclingServe: true
        - log:
            message: Document converted to Markdown successfully
        - setProperty:
            name: sourceFilePath
            expression:
              simple:
                expression: "${exchangeProperty.originalFileName}"
        - setProperty:
            name: convertedMarkdown
            expression:
              simple:
                expression: "${body}"
        - script:
            expression:
              groovy:
                expression: |
                  def markdown = exchange.getProperty("convertedMarkdown", String.class)
                  def preview = markdown.length() > 500 ? markdown.substring(0, 500) + "..." : markdown
                  log.info("Converted Markdown preview:\n{}", preview)
        - setBody:
            expression:
              simple:
                expression: |
                  You are a helpful document analysis assistant. Please analyze the following document and provide:
                  1. A brief summary (2-3 sentences)
                  2. Key topics and main points
                  3. Any important findings or conclusions

                  Document content:
                  ${exchangeProperty.convertedMarkdown}
        - log:
            message: Analyzing document with AI model...
        - to:
            uri: langchain4j-chat
            parameters:
              chatId: analysis
              chatModel: "#chatModel"
        - setProperty:
            name: aiAnalysis
            expression:
              simple:
                expression: "${body}"
        - log:
            message: AI analysis completed
        - script:
            expression:
              groovy:
                expression: |
                  def fileName = exchange.getProperty("originalFileName")
                  def markdown = exchange.getProperty("convertedMarkdown", String.class)
                  def analysis = exchange.getProperty("aiAnalysis", String.class)
                  def dateStr = new java.text.SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new java.util.Date())

                  def result = "# Document Analysis Report\n\n" +
                    "**File:** ${fileName}\n" +
                    "**Date:** ${dateStr}\n\n" +
                    "---\n\n" +
                    "## AI Analysis\n\n" +
                    "${analysis}\n\n" +
                    "---\n\n" +
                    "## Full Document Content (Markdown)\n\n" +
                    "${markdown}"

                  exchange.message.setBody(result)
        - setHeader:
            name: CamelFileName
            expression:
              simple:
                expression: "${exchangeProperty.originalFileName}_analysis.md"
        - to:
            uri: file
            parameters:
              directoryName: "{{output.directory}}"
        - log:
            message: "Analysis report saved: ${header.CamelFileName}"
        - script:
            expression:
              groovy:
                expression: |
                  import java.nio.file.Files
                  import java.nio.file.Paths

                  def docDir = camelContext.resolvePropertyPlaceholders("{{documents.directory}}")
                  def fileName = exchange.getProperty("sourceFilePath")
                  def filePath = Paths.get(docDir, fileName)

                  if (Files.exists(filePath)) {
                    Files.delete(filePath)
                    log.info("Cleaned up source file: {}", filePath)
                  }
        - log:
            message: "Processing complete for: ${exchangeProperty.originalFileName}"
- route:
    id: document-qa-api
    from:
      uri: platform-http
      parameters:
        path: /api/ask
      steps:
        - log:
            message: "Received question: ${body}"
        - setProperty:
            name: userQuestion
            expression:
              simple:
                expression: "${body}"
        - script:
            expression:
              groovy:
                expression: |
                  import java.nio.file.Files
                  import java.nio.file.Paths
                  import java.util.stream.Collectors

                  def docDir = camelContext.resolvePropertyPlaceholders("{{documents.directory}}")
                  def docPath = Paths.get(docDir)

                  if (Files.exists(docPath)) {
                    def latestFile = Files.list(docPath)
                      .filter { f -> f.toString().matches(".*\\.(pdf|docx|pptx|html|md)") }
                      .max { f1, f2 -> Files.getLastModifiedTime(f1).compareTo(Files.getLastModifiedTime(f2)) }
                      .orElse(null)

                    if (latestFile != null) {
                      exchange.message.setBody(latestFile.toFile())
                      exchange.setProperty("documentFound", true)
                    } else {
                      exchange.setProperty("documentFound", false)
                      exchange.message.setBody("No documents found in directory")
                    }
                  } else {
                    exchange.setProperty("documentFound", false)
                    exchange.message.setBody("Documents directory does not exist")
                  }
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${exchangeProperty.documentFound} == true"
                steps:
                  - log:
                      message: Converting document for Q&A...
                  - to:
                      uri: docling
                      parameters:
                        operationId: CONVERT_TO_MARKDOWN
                        contentInBody: true
                        doclingServeUrl: "{{docling.serve.url}}"
                        useDoclingServe: true
                  - setProperty:
                      name: documentContent
                      expression:
                        simple:
                          expression: "${body}"
                  - setBody:
                      expression:
                        simple:
                          expression: |
                            You are a helpful assistant answering questions about documents.

                            Document content:
                            ${exchangeProperty.documentContent}

                            Question: ${exchangeProperty.userQuestion}

                            Please provide a clear and concise answer based on the document content above.
                  - to:
                      uri: langchain4j-chat
                      parameters:
                        chatId: qa
                        chatModel: "#chatModel"
                  - setHeader:
                      name: Content-Type
                      expression:
                        constant:
                          expression: text/plain
            otherwise:
              steps:
                - setBody:
                    expression:
                      simple:
                        expression: "Error: ${body}"
                - setHeader:
                    name: Content-Type
                    expression:
                      constant:
                        expression: text/plain
- route:
    id: batch-summarization
    from:
      uri: timer
      parameters:
        timerName: batchSummarize
        delay: "{{batch.delay}}"
        repeatCount: 0
      steps:
        - log:
            message: Starting batch document summarization...
        - script:
            expression:
              groovy:
                expression: |
                  import java.nio.file.Files
                  import java.nio.file.Paths

                  def docDir = camelContext.resolvePropertyPlaceholders("{{documents.directory}}")
                  def docPath = Paths.get(docDir)

                  if (Files.exists(docPath)) {
                    def files = Files.list(docPath)
                      .filter { f -> f.toString().matches(".*\\.(pdf|docx|pptx|html|md)") }
                      .collect { it.toFile() }

                    exchange.message.setBody(files)
                  } else {
                    exchange.message.setBody([])
                  }
        - split:
            expression:
              simple:
                expression: "${body}"
            steps:
              - log:
                  message: "Summarizing: ${body}"
              - setProperty:
                  name: currentFile
                  expression:
                    simple:
                      expression: "${body}"
              - to:
                  uri: docling
                  parameters:
                    operationId: CONVERT_TO_MARKDOWN
                    contentInBody: true
                    doclingServeUrl: "{{docling.serve.url}}"
                    useDoclingServe: true
              - setBody:
                  expression:
                    simple:
                      expression: |
                        Please provide a concise 3-sentence summary of the following document:

                        ${body}
              - to:
                  uri: langchain4j-chat
                  parameters:
                    chatId: summary
                    chatModel: "#chatModel"
              - log:
                  message: "Summary: ${body}"
- route:
    id: health-check
    from:
      uri: platform-http
      parameters:
        path: /api/health
      steps:
        - log:
            message: Health check requested
        - script:
            expression:
              groovy:
                expression: |
                  import groovy.json.JsonOutput

                  def doclingUrl = camelContext.resolvePropertyPlaceholders("{{docling.serve.url}}")
                  def ollamaUrl = camelContext.resolvePropertyPlaceholders("{{ollama.base.url}}")

                  def health = [
                    status: "healthy",
                    components: [
                      docling: [
                        url: doclingUrl,
                        status: "configured"
                      ],
                      ollama: [
                        url: ollamaUrl,
                        model: camelContext.resolvePropertyPlaceholders("{{ollama.model.name}}"),
                        status: "configured"
                      ]
                    ],
                    directories: [
                      documents: camelContext.resolvePropertyPlaceholders("{{documents.directory}}"),
                      output: camelContext.resolvePropertyPlaceholders("{{output.directory}}")
                    ]
                  ]

                  exchange.message.setBody(JsonOutput.toJson(health))
        - setHeader:
            name: Content-Type
            expression:
              constant:
                expression: application/json
- route:
    id: extract-structured-data
    from:
      uri: platform-http
      parameters:
        path: /api/extract
        httpMethodRestrict: POST
      steps:
        - log:
            message: Extracting structured data from uploaded document
        - setProperty:
            name: uploadedContent
            expression:
              simple:
                expression: "${body}"
        - to:
            uri: docling
            parameters:
              operationId: EXTRACT_STRUCTURED_DATA
              contentInBody: true
              doclingServeUrl: "{{docling.serve.url}}"
              outputFormat: json
              useDoclingServe: true
        - setProperty:
            name: structuredData
            expression:
              simple:
                expression: "${body}"
        - setBody:
            expression:
              simple:
                expression: |
                  Please analyze this structured document data and identify:
                  1. Document type and structure
                  2. Key data fields and their values
                  3. Any tables or structured information

                  Structured data:
                  ${exchangeProperty.structuredData}
        - to:
            uri: langchain4j-chat
            parameters:
              chatId: extract
              chatModel: "#chatModel"
        - setHeader:
            name: Content-Type
            expression:
              constant:
                expression: text/plain
