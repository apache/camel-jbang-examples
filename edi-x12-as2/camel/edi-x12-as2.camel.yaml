- routeConfiguration:
    id: as2Error
- route:
    id: receivePurchaseOrder
    routeConfigurationId: as2Error
    from:
      uri: as2
      parameters:
        apiName: server
        methodName: listen
        requestUriPattern: /mycorp/orders
        serverPortNumber: 8081
      steps:
        - onException:
            exception:
              - java.lang.Exception
            handled:
              constant:
                expression: "true"
        - script:
            expression:
              groovy:
                expression: "httpContext = exchangeProperties['CamelAs2.interchange']\n\
                  httpContext.setAttribute(org.apache.camel.component.as2.api.AS2Header.DISPOSITION_TYPE,\
                  \ \n                         org.apache.camel.component.as2.api.entity.AS2DispositionType.FAILED)\n"
        - to:
            uri: jms
            parameters:
              destinationType: queue
              destinationName: edi
- route:
    id: ingestPurchaseOrder
    from:
      uri: jms
      parameters:
        destinationType: queue
        destinationName: edi
      steps:
        - to:
            uri: smooks
            parameters:
              smooksConfig: file:../smooks/ingest-x12-config.xml
        - to:
            uri: direct
            parameters:
              name: track
        - to:
            uri: direct
            parameters:
              name: genAck
- route:
    id: generateFunctionalAck
    from:
      uri: direct
      parameters:
        name: genAck
      steps:
        - setBody:
            expression:
              groovy:
                expression: |
                  new org.smooks.io.source.JavaSource([*:headers.CamelSmooksExecutionContext.beanContext.beanMap])
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${headers.CamelSmooksExecutionContext.getTerminationError}\
                      \ == null"
                steps:
                  - transform:
                      expression:
                        groovy:
                          expression: "body.with {beans.ackStatus = 'A'; body}"
            otherwise:
              steps:
                - transform:
                    expression:
                      groovy:
                        expression: "body.with {beans.ackStatus = 'R'; body}"
        - to:
            uri: smooks
            parameters:
              smooksConfig: file:../smooks/gen-x12-ack-config.xml
        - to:
            uri: as2
            parameters:
              apiName: client
              methodName: send
              as2From: mycorp
              as2MessageStructure: PLAIN
              as2To: acme
              ediMessageCharset: charset=US-ASCII
              ediMessageContentType: application/edi-x12
              from: bob@example.org
              inBody: ediMessage
              requestUri: /acme/gateway
              subject: Purchase Order Ack
              targetHostName: "{{partner.host.name}}"
              targetPortNumber: 8081
- route:
    id: verifyAgreement
    from:
      uri: direct
      parameters:
        name: tpm
      steps:
        - toD:
            uri: http
            parameters:
              httpUri: "{{tpm.address}}"
              httpMethod: GET
              receiver: "${body['applicationReceiverCode']}"
              sender: "${body['applicationSenderCode']}"
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${headers.CamelHttpResponseCode} > 299"
                steps:
                  - throwException:
                      exceptionType: org.apache.camel.edi.example.InvalidPartnerException
- route:
    id: createErpOrder
    from:
      uri: direct
      parameters:
        name: erp
      steps:
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${headers.CamelSmooksExecutionContext.getTerminationError}\
                      \ == null"
                steps:
                  - marshal:
                      json: {}
                  - to:
                      uri: http
                      parameters:
                        httpUri: "{{erp.address}}/purchase_orders"
                        httpMethod: POST
- route:
    id: track
    from:
      uri: direct
      parameters:
        name: track
      steps:
        - setHeader:
            name: Content-Type
            expression:
              constant:
                expression: application/xml
        - to:
            uri: http
            parameters:
              httpUri: "{{tracker.address}}"
              httpMethod: POST
