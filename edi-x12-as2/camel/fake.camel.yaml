- route:
    from:
      uri: as2
      parameters:
        apiName: server
        methodName: listen
        requestUriPattern: /acme/gateway
        serverPortNumber: 8081
      steps:
        - log:
            message: |
              Received functional ack:
              ${body}
- route:
    from:
      uri: rest
      parameters:
        method: get
        path: tpm
      steps:
        - log:
            message: "Verified agreement between ${header.receiver} and ${header.sender}"
- route:
    from:
      uri: rest
      parameters:
        method: post
        path: tracker
      steps:
        - log:
            message: "Tracked ${body}"
- route:
    from:
      uri: rest
      parameters:
        method: post
        path: erp/purchase_orders
      steps:
        - log:
            message: "Processed ${body}"

