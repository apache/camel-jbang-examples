name: news-service-test
description: Sample test in YAML
variables:
  - name: "news.headline"
    value: "Hello from Camel"
actions:
  - kubernetes:
      createSecret:
        name: "news-secret"
        file: "news-secret.properties"
  - camel:
      jbang:
        kubernetes:
          run:
            autoRemove: true
            clusterType: kind
            integration:
              file: "../news-service.camel.yaml"
            args:
              - "--config"
              - "secret:news-secret@/etc/camel/secrets/"
  - camel:
      jbang:
        kubernetes:
          verify:
            integration: news-service
            logMessage: "Routes startup"
  - kubernetes:
      connect:
        service:
          name: news-service
          port: 8080
  - http:
      client: "news-service.client"
      sendRequest:
        GET:
          path: "/news"
  - http:
      client: "news-service.client"
      receiveResponse:
        response:
          status: 200
          body:
            data: "${news.headline}"
          contentType: "text/plain;charset=UTF-8"
