- route:
    from:
      uri: kamelet
      parameters:
        templateId: mqtt5-source
        brokerUrl: "{{mqtt.broker.url}}"
        topic: "{{mqtt.topic}}"
      steps:
        - transform:
            expression:
              jq:
                expression: .value
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${body} > 20"
                steps:
                  - log:
                      message: "Warm temperature at ${body}"
            otherwise:
              steps:
                - log:
                    message: "Cold temperature at ${body}"

