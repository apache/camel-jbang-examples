- route:
    from:
      uri: direct
      parameters:
        name: pii-redaction
      steps:
        - to:
            uri: openai
            parameters:
              operation: chat-completion
              jsonSchema: resource:classpath:pii.schema.json
              systemMessage: "You are a strict data privacy compliance assistant.\
                \ Your goal is to analyze the user input, redact all PII, and return\
                \ the results in the specified JSON format. RULES: 1. ONLY redact\
                \ specific identifiers, 2. DO NOT redact generic titles, roles,\
                \ or common nouns unless they are part of a proper noun. 3. Preserve\
                \ the grammatical structure of the sentence."
              temperature: 0.15
- route:
    from:
      uri: stream
      parameters:
        kind: in
      steps:
        - to:
            uri: direct
            parameters:
              name: pii-redaction
        - to:
            uri: stream
            parameters:
              kind: out

