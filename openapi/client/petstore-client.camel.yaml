- route:
    from:
      uri: file
      parameters:
        directoryName: examples/
        noop: true
      steps:
        - convertBodyTo:
            type: java.lang.String
            charset: UTF8
        - setHeader:
            name: petId
            expression:
              simple:
                expression: "${file:onlyname.noext}"
        - setHeader:
            name: Content-Type
            expression:
              constant:
                expression: application/json
        - to:
            uri: log
            parameters:
              loggerName: info
              showHeaders: true
        - to:
            uri: kamelet
            parameters:
              templateId: rest-openapi-sink
              operation: addPet
              specification: "{{openapi.specification.url}}"

