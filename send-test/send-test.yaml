- route:
    id: greet
    from:
      uri: direct:greet
      steps:
        - log: "Received: ${body}"
        - setBody:
            simple: "Hello ${body}!"

- route:
    id: ticker
    from:
      uri: timer:tick
      parameters:
        period: 5000
      steps:
        - setBody:
            simple: "Tick at ${date:now:HH:mm:ss}"
        - log: "${body}"
