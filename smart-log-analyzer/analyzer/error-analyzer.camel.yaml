- route:
    id: error-log-analyzer
    from:
      uri: jms
      parameters:
        destinationName: "{{camel.jms.queue.error-logs}}"
      steps:
        - log:
            message: Received ERROR log for analysis
        - setVariable:
            name: traceId
            expression:
              simple:
                expression: "${body}"
        - log:
            message: "Retrieving all events for traceId: ${variable.traceId}"
        - setHeader:
            name: CamelInfinispanKey
            expression:
              simple:
                expression: "otel-${variable.traceId}"
        - to:
            uri: infinispan
            parameters:
              cacheName: events
              operation: GET
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${body} != null && ${body} != ''"
                steps:
                  - setVariable:
                      name: recordCount
                      expression:
                        jq:
                          resultType: java.lang.String
                          expression: length
                  - log:
                      message: "Sending ${variable.recordCount} records to LLM for\
                        \ analysis"
                  - setVariable:
                      name: eventsJson
                      expression:
                        simple:
                          expression: "${body}"
                  - setBody:
                      expression:
                        simple:
                          expression: |
                            Analyze the following OpenTelemetry logs and traces for traceId ${variable.traceId}.
                            Identify the root cause of the error, explain what happened, and suggest possible fixes.

                            Events (sorted by timestamp):
                            ${variable.eventsJson}
                  - to:
                      uri: openai
                      parameters:
                        operation: chat-completion
                        systemMessage: "You are an expert DevOps engineer and log\
                          \ analyst. Analyze OpenTelemetry logs and traces to identify\
                          \ errors, their root causes, and provide actionable recommendations.\
                          \ Be concise and focus on the error. You want to build\
                          \ a tree of calls by associating each span with its parent,\
                          \  where parentSpanId corresponds to the parent caller’\
                          s spanId."
                  - log:
                      message: "LLM Analysis for traceId ${variable.traceId}: ${body}"
                  - setHeader:
                      name: traceId
                      expression:
                        simple:
                          expression: "${variable.traceId}"
                  - to:
                      uri: jms
                      parameters:
                        destinationName: "{{camel.jms.queue.analysis-result}}"
                  - log:
                      message: "Sent analysis result to queue for traceId: ${variable.traceId}"
            otherwise:
              steps:
                - log:
                    message: "No events found in Infinispan for traceId: ${variable.traceId}"
                    loggingLevel: WARN

