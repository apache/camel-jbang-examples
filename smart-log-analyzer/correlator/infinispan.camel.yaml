- route:
    from:
      uri: direct
      parameters:
        name: store
      steps:
        - log:
            id: log-record
            message: "Processing record: ${body}"
            loggingLevel: DEBUG
        - setVariable:
            name: traceId
            expression:
              jq:
                resultType: java.lang.String
                expression: .traceId
        - filter:
            expression:
              simple:
                expression: "${variable.traceId} != null && ${variable.traceId}\
                  \ != ''"
            steps:
              - claimCheck:
                  operation: Set
                  key: currentRecord
              - setHeader:
                  name: CamelInfinispanKey
                  expression:
                    simple:
                      expression: "otel-${variable.traceId}"
              - to:
                  uri: infinispan
                  parameters:
                    cacheName: events
                    operation: GET
              - choice:
                  when:
                    - expression:
                        simple:
                          expression: "${body} != null && ${body} != ''"
                      steps:
                        - setVariable:
                            name: existingRecords
                            expression:
                              simple:
                                expression: "${body}"
                        - claimCheck:
                            operation: Get
                            key: currentRecord
                        - setBody:
                            expression:
                              jq:
                                resultType: java.lang.String
                                expression: "(variable(\"existingRecords\") | fromjson)\
                                  \ + [.] | sort_by(.timeUnixNano)"
                  otherwise:
                    steps:
                      - claimCheck:
                          operation: Get
                          key: currentRecord
                      - setBody:
                          expression:
                            jq:
                              resultType: java.lang.String
                              expression: "[.]"
              - setHeader:
                  name: CamelInfinispanKey
                  expression:
                    simple:
                      expression: "otel-${variable.traceId}"
              - setHeader:
                  name: CamelInfinispanValue
                  expression:
                    simple:
                      expression: "${body}"
              - to:
                  uri: infinispan
                  parameters:
                    cacheName: events
                    operation: PUT
              - claimCheck:
                  operation: GetAndRemove
                  key: currentRecord
              - log:
                  id: log-stored
                  message: "Stored record for traceId: ${variable.traceId}"
              - choice:
                  when:
                    - expression:
                        jq:
                          expression: (.severityText // "" | ascii_downcase) ==
                            "error" or .status == "2"
                      steps:
                        - log:
                            message: "Adding ERROR log to events-to-process cache\
                              \ for traceId: ${variable.traceId}"
                        - setHeader:
                            name: CamelInfinispanKey
                            expression:
                              simple:
                                expression: "${variable.traceId}"
                        - setHeader:
                            name: CamelInfinispanValue
                            expression:
                              simple:
                                expression: "${variable.traceId}"
                        - to:
                            uri: infinispan
                            parameters:
                              cacheName: events-to-process
                              operation: PUTIFABSENT
- route:
    id: route-expired-events
    from:
      uri: infinispan
      parameters:
        cacheName: events-to-process
        eventTypes: CLIENT_CACHE_ENTRY_EXPIRED
      steps:
        - setBody:
            expression:
              simple:
                expression: "${header.CamelInfinispanKey}"
        - log:
            message: "Expired cache entry received, sending to JMS queue: ${body}"
        - to:
            uri: jms
            parameters:
              destinationName: "{{camel.jms.queue.error-logs}}"

