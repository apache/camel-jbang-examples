- route:
    id: log-consumer
    from:
      uri: kafka
      parameters:
        topic: "{{camel.kafka.topic.logs}}"
        autoOffsetReset: earliest
        groupId: correlator
      steps:
        - log:
            message: "Received log from Kafka \\n ${body}"
            loggingLevel: DEBUG
        - split:
            id: split-logs
            expression:
              jsonpath:
                writeAsString: "true"
                expression: "$.resourceLogs[*].scopeLogs[*].logRecords[*]"
            steps:
              - setHeader:
                  id: set-logs-header
                  name: logs
                  expression:
                    simple:
                      expression: "${body}"
              - setBody:
                  id: set-dummy-xml
                  expression:
                    constant:
                      expression: <dummy/>
              - step:
                  id: kaoto-datamapper-4a94acc3
                  steps:
                    - to:
                        id: kaoto-datamapper-xslt
                        uri: xslt-saxon
                        parameters:
                          resourceUri: kaoto-datamapper-4a94acc3.xsl
                          allowStAX: true
              - log:
                  message: "Mapped output: ${body}"
                  loggingLevel: DEBUG
              - to:
                  uri: direct
                  parameters:
                    name: store

