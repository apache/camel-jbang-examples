- route:
    id: trace-consumer
    from:
      uri: kafka
      parameters:
        topic: "{{camel.kafka.topic.spans}}"
        autoOffsetReset: earliest
        groupId: correlator
      steps:
        - log:
            message: "Received trace from Kafka\\n${body}"
            loggingLevel: DEBUG
        - split:
            id: split-spans
            expression:
              jsonpath:
                writeAsString: "true"
                expression: "$.resourceSpans[*].scopeSpans[*].spans[*]"
            steps:
              - setHeader:
                  id: set-traces-header
                  name: traces
                  expression:
                    simple:
                      expression: "${body}"
              - setBody:
                  id: set-dummy-xml-1
                  expression:
                    constant:
                      expression: <dummy/>
              - step:
                  id: kaoto-datamapper-8f5bb2dd
                  steps:
                    - to:
                        uri: xslt-saxon
                        parameters:
                          resourceUri: kaoto-datamapper-8f5bb2dd.xsl
                          allowStAX: true
              - log:
                  message: "Mapped output: ${body}"
                  loggingLevel: DEBUG
              - to:
                  uri: direct
                  parameters:
                    name: store

