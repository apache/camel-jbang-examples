- route:
    id: event-generator
    from:
      uri: timer
      parameters:
        timerName: eventGenerator
        period: 5000
      steps:
        - setVariable:
            name: traceId
            expression:
              simple:
                expression: "${random(10000,99999)}-${date:now:yyyyMMddHHmmssSSS}"
        - setBody:
            expression:
              simple:
                expression: |
                  {"traceId": "${variable.traceId}", "level": "INFO", "message": "Application started processing request", "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}"}
        - to:
            uri: kafka
            parameters:
              topic: log-events
              brokers: localhost:9092
        - setBody:
            expression:
              simple:
                expression: |
                  {"traceId": "${variable.traceId}", "level": "INFO", "message": "Request validation completed successfully", "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}"}
        - to:
            uri: kafka
            parameters:
              topic: log-events
              brokers: localhost:9092
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${random(1,10)} <= 3"
                steps:
                  - setBody:
                      expression:
                        simple:
                          expression: |
                            {"traceId": "${variable.traceId}", "level": "ERROR", "message": "Unexpected error occurred during processing", "timestamp": "${date:now:yyyy-MM-dd'T'HH:mm:ss.SSSZ}"}
                  - to:
                      uri: kafka
                      parameters:
                        topic: log-events
                        brokers: localhost:9092
                  - log:
                      message: "ERROR event sent for traceId: ${variable.traceId}"
            otherwise:
              steps:
                - log:
                    message: "No error generated for traceId: ${variable.traceId}"

