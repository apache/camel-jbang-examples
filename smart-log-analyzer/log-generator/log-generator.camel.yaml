- route:
    id: order-processor
    from:
      uri: timer
      parameters:
        timerName: orderProcessor
        fixedRate: true
        period: "{{timer.order.period:2000}}"
      steps:
        - setVariable:
            name: orderId
            expression:
              simple:
                expression: "ORD-${random(10000,99999)}"
        - log:
            message: "Received new order ${variable.orderId} from customer ${random(1000,9999)}"
            logName: com.example.order.OrderService
        - log:
            message: "Validating order ${variable.orderId}: checking inventory and\
              \ pricing"
            logName: com.example.order.ValidationService
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${random(0,100)} < 30"
                steps:
                  - choice:
                      when:
                        - expression:
                            simple:
                              expression: "${random(0,100)} < 33"
                          steps:
                            - log:
                                message: "Connecting to database for order ${variable.orderId}"
                                logName: com.example.order.DatabaseService
                            - throwException:
                                message: "Database connection failed: Connection\
                                  \ refused to postgres:5432 while processing order\
                                  \ ${variable.orderId}"
                                exceptionType: java.lang.RuntimeException
                        - expression:
                            simple:
                              expression: "${random(0,100)} < 66"
                          steps:
                            - log:
                                message: "Initiating payment for order ${variable.orderId}"
                                logName: com.example.payment.PaymentGateway
                            - throwException:
                                message: "Network timeout while connecting to payment\
                                  \ gateway api.stripe.com for order ${variable.orderId}"
                                exceptionType: java.lang.RuntimeException
                      otherwise:
                        steps:
                          - log:
                              message: "Verifying user authentication for order\
                                \ ${variable.orderId}"
                              logName: com.example.auth.AuthService
                          - throwException:
                              message: "Authentication failed: Invalid JWT token\
                                \ signature for order ${variable.orderId}"
                              exceptionType: java.lang.RuntimeException
            otherwise:
              steps:
                - log:
                    message: "Payment processed successfully for order ${variable.orderId}"
                    logName: com.example.payment.PaymentGateway
                - log:
                    message: "Order ${variable.orderId} completed successfully"
                    logName: com.example.order.OrderService
- route:
    id: health-checker
    from:
      uri: timer
      parameters:
        timerName: healthCheck
        fixedRate: true
        period: 5000
      steps:
        - log:
            message: "Health check: All systems operational"
            loggingLevel: DEBUG
            logName: com.example.health.HealthChecker

