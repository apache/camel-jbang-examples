- rest:
    path: /api/traces
    steps:
      - get:
          id: list-traces
          produces: application/json
      - get:
          id: get-trace-by-id
          path: "/{id}"
          produces: application/json
- route:
    id: route-list-traces
    from:
      uri: direct
      parameters:
        name: list-traces
      steps:
        - setVariable:
            name: storagePath
            expression:
              simple:
                expression: "{{analyzer.storage.root}}"
        - setBody:
            expression:
              groovy:
                expression: |
                  import java.nio.file.*
                  try {
                    def path = Paths.get(exchange.getVariable('storagePath'))
                    if (!Files.exists(path)) {
                      return []
                    }
                    return Files.list(path)
                      .filter(Files::isRegularFile)
                      .filter(p -> p.getFileName().toString().endsWith('.txt'))
                      .map(p -> {
                        def filename = p.getFileName().toString()
                        def traceId = filename.substring(0, filename.lastIndexOf('.txt'))
                        return [id: traceId]
                      })
                      .collect()
                  } catch (Exception e) {
                    return []
                  }
        - marshal:
            json: {}
        - setHeader:
            name: Content-Type
            expression:
              constant:
                expression: application/json
- route:
    id: route-get-trace
    from:
      uri: direct
      parameters:
        name: get-trace
      steps:
        - setVariable:
            name: traceId
            expression:
              simple:
                expression: "${header.id}"
        - pollEnrich:
            timeout: 1000
            expression:
              simple:
                expression: "file:{{analyzer.storage.root}}?fileName=${variable.traceId}.txt&noop=true&idempotent=false"
        - choice:
            when:
              - expression:
                  simple:
                    expression: "${body} != null"
                steps:
                  - convertBodyTo:
                      type: String
                  - setVariable:
                      name: fileContent
                      expression:
                        simple:
                          expression: "${body}"
                  - marshal:
                      json: {}
                  - setBody:
                      expression:
                        simple:
                          expression: "{\"id\":\"${variable.traceId}\",\"content\"\
                            :${body}}"
                  - setHeader:
                      name: Content-Type
                      expression:
                        constant:
                          expression: application/json
            otherwise:
              steps:
                - setHeader:
                    name: CamelHttpResponseCode
                    expression:
                      constant:
                        expression: 404
                - setBody:
                    expression:
                      constant:
                        expression: "{\"error\":\"Trace not found\"}"
                - setHeader:
                    name: Content-Type
                    expression:
                      constant:
                        expression: application/json
